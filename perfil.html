<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - ImportShop S.A.C.</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="js/auth.js"></script>
    <link rel="icon" href="imagenes/empresa/icono.png">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 50px auto;
            background: #fff;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid #eee;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 20px;
        }

        .profile-name {
            font-family: 'Oswald', 'Impact', sans-serif;
            font-size: 2rem;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .profile-email {
            color: #6c757d;
            margin-bottom: 30px;
            font-size: 1.1rem;
        }

        .logout-btn {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background-color: #bb2d3b;
        }
    </style>
</head>

<body>
    <header class="main-header">
        <nav class="nav-container">
            <img src="imagenes/empresa/logo1.png" alt="Logo" class="logo">
            <ul class="nav-links">
                <li><a href="index.html">Inicio</a></li>
                <li><a href="productos.html">Productos</a></li>
                <li><a href="nosotros.html">Nosotros</a></li>
                <li><a href="contactos.html">Contactos</a></li>
            </ul>
            <div class="header-actions">
                <a href="login.html" class="login-link"><i class="fa-solid fa-circle-user"></i> Iniciar sesión</a>
                <div class="header-divider"></div>
                <div class="cart-icon-container">
                    <i class="fa fa-shopping-cart"></i>
                    <span class="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="container my-5">
        <div class="profile-container">
            <div class="profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <h2 class="profile-name mb-4">MI PERFIL</h2>
            
            <form id="profile-form" class="text-start">
                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre Completo</label>
                    <input type="text" id="input-name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Correo Electrónico</label>
                    <input type="email" id="input-email" class="form-control" readonly style="background-color: #e9ecef; cursor: not-allowed;" title="El correo no se puede cambiar">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Rol</label>
                    <input type="text" id="input-role" class="form-control" readonly style="background-color: #e9ecef; cursor: not-allowed;">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Nueva Contraseña (Opcional)</label>
                    <input type="password" id="input-password" class="form-control" placeholder="Dejar en blanco para mantener la actual">
                </div>
                
                <div id="profile-msg" class="mb-3 text-center" style="display: none; font-weight: bold;"></div>

                <div class="d-flex justify-content-between mt-4">
                    <button type="submit" class="btn btn-primary px-4 fw-bold"><i class="fa-solid fa-floppy-disk"></i> Guardar Cambios</button>
                    <button type="button" class="btn btn-danger px-4 fw-bold" id="btn-logout"><i class="fa-solid fa-right-from-bracket"></i> Cerrar Sesión</button>
                </div>
            </form>
        </div>
    </main>

    <script type="module">
        import { getUser } from './js/auth.js';
        import { initCart } from './js/cart.js';

        document.addEventListener('DOMContentLoaded', () => {
            initCart();

            const user = getUser();
            if (!user || user.rol === 'admin') {
                window.location.href = 'index.html';
                return;
            }
            
            document.getElementById('input-name').value = user.nombre;
            document.getElementById('input-email').value = user.correo;
            document.getElementById('input-role').value = user.rol.toUpperCase();

            document.getElementById('profile-form').addEventListener('submit', (e) => {
                e.preventDefault();
                const newName = document.getElementById('input-name').value.trim();
                const newPassword = document.getElementById('input-password').value.trim();
                const msgBox = document.getElementById('profile-msg');
                
                if(!newName) return;

                let users = JSON.parse(localStorage.getItem('usuariosImportShop')) || [];
                const userIndex = users.findIndex(u => u.correo === user.correo);
                
                if (userIndex !== -1) {
                    users[userIndex].nombre = newName;
                    if (newPassword) {
                        users[userIndex].password = newPassword;
                    }
                    localStorage.setItem('usuariosImportShop', JSON.stringify(users));
                }
                
                user.nombre = newName;
                localStorage.setItem('usuarioActivo', JSON.stringify(user));

                msgBox.textContent = '¡Datos actualizados correctamente!';
                msgBox.style.color = '#198754';
                msgBox.style.display = 'block';

                const link = document.querySelector('.login-link');
                if(link) {
                    link.innerHTML = `<i class="fa-solid fa-circle-user"></i> ${newName}`;
                }

                setTimeout(() => {
                    msgBox.style.display = 'none';
                    if (newPassword) {
                        document.getElementById('input-password').value = '';
                    }
                }, 3000);
            });

            document.getElementById('btn-logout').addEventListener('click', () => {
                if (confirm('¿Deseas cerrar sesión?')) {
                    localStorage.removeItem('usuarioActivo');
                    window.location.href = 'index.html';
                }
            });
        });
    </script>
</body>

</html>
